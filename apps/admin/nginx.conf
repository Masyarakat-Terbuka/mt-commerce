# nginx config for the admin SPA.
#
# Listens on :8080 because the runtime image is nginx-unprivileged.
# Caddy in front terminates TLS and proxies admin.${DOMAIN} → admin:8080.
#
# Highlights:
#   - SPA fallback: every unknown path serves index.html so the React Router
#     can take over.
#   - Aggressive cache for hashed assets under /assets/. Vite emits
#     content-hashed filenames so they're safe to cache forever.
#   - No-cache for index.html so a fresh deploy is picked up immediately.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression. nginx:alpine ships gzip; brotli is not built-in.
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Hashed assets — immutable.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static files at root other than index.html.
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp|woff2?)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback. Anything else returns index.html with no caching so the
    # next deploy reaches the browser on the next reload.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Hide nginx version in error pages and headers.
    server_tokens off;
}
