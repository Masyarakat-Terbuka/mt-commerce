# nginx config for the storefront.
#
# Astro emits a multi-page static site (locale-prefixed routes, sitemap,
# robots.txt). Unlike the admin SPA, we do NOT route every miss to a single
# index.html — Astro generates a real `404.html` we should serve.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Astro hashes JS/CSS bundles into _astro/. Cache forever.
    location /_astro/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static media. Tighter cache so an operator can swap a logo without
    # waiting a year for clients to forget it.
    location ~* \.(?:gif|jpe?g|png|svg|webp|woff2?|ico)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # `astro build` emits both `/about` and `/about/index.html`; the second
    # try_files lookup turns a directory request into the index inside it.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
        add_header Cache-Control "public, max-age=300";
    }

    # Astro emits 404.html at the root of dist/.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    server_tokens off;
}
