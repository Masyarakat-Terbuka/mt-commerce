name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

      # `bun --filter '*' <script>` skips workspaces that do not define the
      # script, so missing scripts in some packages will not fail the run.
      - name: Lint
        run: bun --filter '*' lint

      - name: Test
        run: bun --filter '*' test

      - name: Build
        run: bun --filter '*' build
